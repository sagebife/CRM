<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoristas | Turismundo CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Custom scrollbar to match our elegant UI */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-24 lg:pb-0">

    <!-- Header Desktop/Mobile -->
    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="dashboard.html" class="text-white hover:text-gray-300 transition text-lg">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <span class="h-6 w-px bg-blue-700"></span>
                <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
                    <i class="fas fa-steering-wheel"></i> Turismundo CRM
                </h1>
            </div>
            <div class="hidden md:flex space-x-6">
                <a href="#" class="text-blue-200 hover:text-white transition">Dashboard</a>
                <a href="#" class="text-blue-200 hover:text-white transition">Reservas</a>
                <a href="#" class="text-white font-semibold border-b-2 border-white pb-1">Motoristas</a>
                <a href="#" class="text-blue-200 hover:text-white transition">Financeiro</a>
            </div>
            <div class="flex items-center space-x-2">
                <span class="bg-emerald-500 w-2.5 h-2.5 rounded-full animate-pulse"></span>
                <span class="text-xs text-blue-200 hidden sm:inline">Operação Online</span>
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="max-w-7xl mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- COLUNA 1: FORMULÁRIO DE CADASTRO -->
        <section class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit sticky top-20">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-bold text-blue-900 flex items-center gap-2">
                    <i class="fas fa-user-plus text-blue-600"></i> Cadastrar Motorista
                </h2>
                <span class="text-xs bg-blue-50 text-blue-700 px-2.5 py-1 rounded-full font-semibold">Novo Parceiro</span>
            </div>

            <form id="driverForm" onsubmit="addDriver(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nome Completo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="driverName" required placeholder="Ex: Paulo Souza" 
                            class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">WhatsApp</label>
                        <input type="tel" id="driverPhone" required placeholder="Ex: 55119999999" 
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Veículo / Modelo</label>
                        <input type="text" id="driverVehicle" required placeholder="Ex: Chevrolet Spin" 
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Placa</label>
                        <input type="text" id="driverPlate" required placeholder="Ex: PNG-8D43" 
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Capacidade (Pax)</label>
                        <input type="number" id="driverCapacity" required min="1" value="4" 
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Valor Combinado ($)</label>
                        <input type="number" id="driverValue" required placeholder="Ex: 80" 
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Moeda</label>
                        <select id="driverCurrency" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                            <option value="USD">USD ($)</option>
                            <option value="BRL">BRL (R$)</option>
                            <option value="ARS">ARS ($)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Chave Pix ou Dados Bancários</label>
                    <input type="text" id="driverPix" required placeholder="Chave Pix, CPF, E-mail ou Alias" 
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                </div>

                <button type="submit" 
                    class="w-full py-4 bg-blue-900 text-white font-bold rounded-xl hover:bg-blue-800 transition shadow-md flex items-center justify-center gap-2 text-sm mt-2">
                    <i class="fas fa-plus-circle"></i> Cadastrar e Ativar
                </button>
            </form>
        </section>

        <!-- COLUNA 2: LISTA DE MOTORISTAS ATIVOS -->
        <section class="lg:col-span-2 space-y-4">
            
            <!-- Barra de Busca e Filtros -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-3 justify-between items-center">
                <div class="relative w-full md:w-72">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchInput" oninput="filterDrivers()" placeholder="Buscar motorista ou veículo..." 
                        class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition text-sm">
                </div>
                
                <div class="flex gap-2 w-full md:w-auto">
                    <span class="text-xs bg-emerald-50 text-emerald-700 px-3 py-2 rounded-lg font-bold flex items-center gap-1.5 w-full md:w-auto justify-center">
                        <i class="fas fa-users"></i> <span id="activeCount">3</span> Ativos
                    </span>
                    <span class="text-xs bg-blue-50 text-blue-700 px-3 py-2 rounded-lg font-bold flex items-center gap-1.5 w-full md:w-auto justify-center">
                        <i class="fas fa-car"></i> <span id="totalTripsCount">450</span> Corridas total
                    </span>
                </div>
            </div>

            <!-- Container Dinâmico da Lista -->
            <div id="driversList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Injetado por JS -->
            </div>
        </section>

    </main>

    <!-- Notificação de Toast (Feedback Visual de Custo Zero) -->
    <div id="toast" class="fixed bottom-20 lg:bottom-6 right-6 bg-gray-900 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 transform translate-y-20 opacity-0 transition duration-300 ease-out z-50">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span id="toastMessage">Ação realizada com sucesso!</span>
    </div>

    <!-- Navegação Mobile Inferior -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 shadow-lg z-50">
        <button class="text-gray-400 py-1 flex flex-col items-center"><i class="fas fa-home text-lg"></i><span class="text-[10px] mt-0.5">Início</span></button>
        <button class="text-gray-400 py-1 flex flex-col items-center"><i class="fas fa-calendar-alt text-lg"></i><span class="text-[10px] mt-0.5">Agenda</span></button>
        <button class="text-blue-900 py-1 flex flex-col items-center"><i class="fas fa-users text-lg"></i><span class="text-[10px] mt-0.5 font-bold">Motoristas</span></button>
        <button class="text-gray-400 py-1 flex flex-col items-center"><i class="fas fa-wallet text-lg"></i><span class="text-[10px] mt-0.5">Financeiro</span></button>
    </nav>

    <!-- Logica Funcional Local -->
    <script>
        // Banco de dados local inicializado para o usuário já rodar e interagir
        let drivers = [
            { 
                id: 1, 
                nome: "Paulo Souza", 
                telefone: "5511999999999", 
                veiculo: "Chevrolet Spin", 
                placa: "PNG-8D43", 
                pix: "paulo.transfers@gmail.com", 
                valor: "80", 
                moeda: "USD", 
                capacidade: "6", 
                avaliacao: 5, 
                corridas: 142 
            },
            { 
                id: 2, 
                nome: "Jorge Martinez", 
                telefone: "5491133334444", 
                veiculo: "Toyota Corolla", 
                placa: "AE-234-OP", 
                pix: "jorge.mercado.pago", 
                valor: "50", 
                moeda: "USD", 
                capacidade: "4", 
                avaliacao: 4, 
                corridas: 98 
            },
            { 
                id: 3, 
                nome: "Carlos Gomez", 
                telefone: "5491155556666", 
                veiculo: "Mercedes Sprinter", 
                placa: "AD-987-ZZ", 
                pix: "carlos.sprinter.pix", 
                valor: "150", 
                moeda: "USD", 
                capacidade: "15", 
                avaliacao: 5, 
                corridas: 210 
            }
        ];

        // Renderiza a lista de motoristas na tela
        function renderDrivers(dataToRender = drivers) {
            const container = document.getElementById('driversList');
            container.innerHTML = '';

            dataToRender.forEach(driver => {
                // Gera estrelas da avaliação
                let stars = '';
                for (let i = 0; i < 5; i++) {
                    stars += `<i class="fas fa-star ${i < driver.avaliacao ? 'text-amber-400' : 'text-gray-200'} text-xs"></i>`;
                }

                const card = `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition duration-200 flex flex-col justify-between">
                        <div>
                            <!-- Header do Cartão -->
                            <div class="flex items-start justify-between mb-3">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-900 font-bold flex items-center justify-center text-lg shadow-sm">
                                        ${driver.nome.charAt(0)}${driver.nome.split(' ')[1] ? driver.nome.split(' ')[1].charAt(0) : ''}
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-gray-800 text-base leading-tight">${driver.nome}</h3>
                                        <div class="flex gap-1 mt-1">${stars}</div>
                                    </div>
                                </div>
                                <button onclick="deleteDriver(${driver.id})" class="text-gray-300 hover:text-red-500 transition text-sm p-1">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>

                            <!-- Info do Veículo -->
                            <div class="bg-gray-50 p-3 rounded-xl space-y-1.5 text-xs text-gray-600 mb-3 border border-gray-100">
                                <p class="flex justify-between">
                                    <span class="font-medium">🚗 Veículo:</span> 
                                    <span class="text-gray-900 font-semibold">${driver.veiculo}</span>
                                </p>
                                <p class="flex justify-between">
                                    <span class="font-medium">🔢 Placa:</span> 
                                    <span class="bg-gray-200 px-1.5 py-0.5 rounded font-mono text-gray-900 font-bold">${driver.placa}</span>
                                </p>
                                <p class="flex justify-between">
                                    <span class="font-medium">👥 Cap. Max:</span> 
                                    <span class="text-gray-900 font-semibold">${driver.capacidade} pax</span>
                                </p>
                            </div>

                            <!-- Financeiro / Pix -->
                            <div class="space-y-1 text-xs mb-4">
                                <p class="flex justify-between items-center">
                                    <span class="text-gray-500 font-medium">💵 Valor Combinado:</span>
                                    <span class="font-bold text-emerald-600 text-sm">${driver.valor} ${driver.moeda}</span>
                                </p>
                                <p class="flex justify-between items-center gap-2">
                                    <span class="text-gray-500 font-medium">🔑 Chave Pix:</span>
                                    <span class="truncate max-w-[120px] font-mono text-gray-700 bg-blue-50/50 px-1 rounded" title="${driver.pix}">${driver.pix}</span>
                                    <button onclick="copyToClipboard('${driver.pix}')" class="text-blue-600 hover:text-blue-800 transition" title="Copiar Chave">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </p>
                            </div>
                        </div>

                        <!-- Ações do Motorista -->
                        <div class="grid grid-cols-2 gap-2 pt-3 border-t border-gray-100">
                            <a href="https://wa.me/${driver.telefone}" target="_blank" 
                                class="py-2.5 bg-emerald-50 text-emerald-700 rounded-xl hover:bg-emerald-100 transition text-center font-bold text-xs flex items-center justify-center gap-1.5">
                                <i class="fab fa-whatsapp text-sm"></i> Chamar
                            </a>
                            <div class="py-2.5 bg-gray-50 text-gray-700 rounded-xl text-center font-bold text-xs flex items-center justify-center gap-1.5">
                                <i class="fas fa-route text-blue-500"></i> ${driver.corridas} viagens
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });

            // Atualiza contadores
            document.getElementById('activeCount').innerText = drivers.length;
            const totalTrips = drivers.reduce((sum, d) => sum + Number(d.corridas), 0);
            document.getElementById('totalTripsCount').innerText = totalTrips;
        }

        // Função de cadastro de novo motorista com simulação funcional local
        function addDriver(event) {
            event.preventDefault();

            const newDriver = {
                id: Date.now(),
                nome: document.getElementById('driverName').value,
                telefone: document.getElementById('driverPhone').value,
                veiculo: document.getElementById('driverVehicle').value,
                placa: document.getElementById('driverPlate').value.toUpperCase(),
                pix: document.getElementById('driverPix').value,
                valor: document.getElementById('driverValue').value,
                moeda: document.getElementById('driverCurrency').value,
                capacidade: document.getElementById('driverCapacity').value,
                avaliacao: 5,
                corridas: 0
            };

            drivers.unshift(newDriver); // Adiciona no início da lista
            renderDrivers();
            
            // Limpa o formulário
            document.getElementById('driverForm').reset();
            document.getElementById('driverCapacity').value = "4";

            showToast("Motorista cadastrado e ativo com sucesso!");
        }

        // Deleta motorista da lista local
        function deleteDriver(id) {
            if(confirm("Tem certeza que deseja desativar este motorista parceiro?")) {
                drivers = drivers.filter(d => d.id !== id);
                renderDrivers();
                showToast("Motorista removido da operação.");
            }
        }

        // Filtra motoristas em tempo real pelo campo de busca
        function filterDrivers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = drivers.filter(d => 
                d.nome.toLowerCase().includes(query) || 
                d.veiculo.toLowerCase().includes(query) ||
                d.placa.toLowerCase().includes(query)
            );
            renderDrivers(filtered);
        }

        // Utilitário para copiar Pix para área de transferência
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("Chave Pix copiada!");
            });
        }

        // Sistema de Feedback Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            
            // Entra na tela
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            // Sai da tela após 2.5s
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 2500);
        }

        // Inicialização primária
        renderDrivers();
    </script>
</body>
</html>
